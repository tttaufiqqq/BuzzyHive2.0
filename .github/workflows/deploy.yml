name: Deploy BuzzyHive to Azure

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. PHP setup ─────────────────────────────────────────────────────────
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, xml, curl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # ── 3. Node + frontend build ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── 4. Laravel production prep ───────────────────────────────────────────
      - name: Copy .env for build
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Cache config/routes/views
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      # ── 5. Package for deployment ─────────────────────────────────────────────
      - name: Zip application
        run: |
          zip -r buzzyhive.zip . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude "tests/*" \
            --exclude "*.zip"

      # ── 6. Deploy to Azure App Service ───────────────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: buzzyhive-app        # ← your Azure App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: buzzyhive.zip

      # ── 7. Run migrations via SSH (post-deploy) ───────────────────────────────
      # Optional: use Azure CLI to SSH in and migrate
      # Alternatively, set startup command in App Service to run artisan migrate
